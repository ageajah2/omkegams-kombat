<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OMKE KOMBAT</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="viewport">

        <div id="menu">
            <div class="menu-header">
                <div class="title-group">
                    <h2 class="main-title">OKE GAS KOMBAT</h2>
                    <h1 class="select-label">PILIH PETARUNG</h1>
                    <p class="orientation-hint">MOHON MIRINGKAN LAYAR</p>
                    <div id="win-counter"
                        style="color: #ffcc00; font-weight: bold; margin-top: 10px; font-size: 18px; text-shadow: 2px 2px 4px #000;">
                        WINS: 0</div>
                </div>
                <button id="fullscreen-btn" onclick="toggleFullscreen()">Full Screen</button>
            </div>
            <div class="cards-container">
                <!-- Karakter akan di-render secara dinamis menggunakan JS -->
            </div>
        </div>

        <div id="game">
            <div id="ui-top">
                <div id="hp-player-container">
                    <div id="hp-player"></div>
                </div>
                <div id="hp-enemy-container">
                    <div id="hp-enemy"></div>
                </div>
            </div>
            <button id="back-btn" onclick="goBack()">Kembali</button>
            <div id="zoom-controls">
                <button onclick="zoomUI(0.1)">+</button>
                <button onclick="zoomUI(-0.1)">-</button>
            </div>
            <div id="ground"></div>
            <div id="player"></div>
            <div id="enemy"></div>
            <div id="controls">
                <div class="btn-group">
                    <div class="btn" id="btn-left">◀</div>
                    <div class="btn" id="btn-right">▶</div>
                </div>
                <div class="btn-group">
                    <div class="btn" id="btn-punch">👊</div>
                </div>
            </div>
            <div id="game-over-screen" style="display: none;">
                <h1 id="game-over-title">MENANG</h1>
                <button onclick="goBack()">KEMBALI KE MENU</button>
            </div>
        </div>
    </div>
    <script src="backgrounds.js"></script>
    <script src="characters.js"></script>
    <script>
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log(`Terjadi kesalahan saat masuk mode fullscreen: ${err.message}`);
                });
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }



        let currentChar = null;
        const viewportEl = document.getElementById('viewport');
        let playerX = 100;
        let pWidth = 200;
        let windowW = viewportEl.clientWidth;
        let facingRight = true;
        let isMovingLeft = false;
        let isMovingRight = false;
        let isPunching = false;
        let moveInterval;

        const playerEl = document.getElementById('player');
        const enemyEl = document.getElementById('enemy');
        const menuEl = document.getElementById('menu');
        const gameEl = document.getElementById('game');

        let playerHp = 100;
        let enemyHp = 100;
        let enemyChar = null;
        let enemyX = 500;
        let enemyFacingRight = false;
        let enemyAction = 'stance';
        let enemyPunchTimer = 0;
        let gameActive = true;
        let playerPunchHit = false;
        let enemyPunchHit = false;
        let isPunchingActive = false; // Cooldown state for player
        let punchCooldownTimer = null;

        // Preloading Images
        function preloadAll() {
            const allImages = [
                ...backgrounds,
                'char/balil/balil-card.jpg',
                'char/pigai/pigai-card.jpg',
                'char/ketuambg/ketua-card.webp',
                'char/superwok/superwok-card.jpg',
                'char/ngutangkhamun/ngtn-card.webp'
            ];

            // Tambahkan gambar karakter
            for (let c in chars) {
                for (let a in chars[c]) {
                    allImages.push(chars[c][a]);
                }
            }

            allImages.forEach(url => {
                const img = new Image();
                img.src = url;
            });
            console.log("Preloading " + allImages.length + " images...");
        }

        // Jalankan preload saat window dimuat
        window.addEventListener('load', preloadAll);

        function updateHpUI() {
            document.getElementById('hp-player').style.width = Math.max(0, playerHp) + '%';
            document.getElementById('hp-enemy').style.width = Math.max(0, enemyHp) + '%';
        }

        let winCount = parseInt(localStorage.getItem('winCount')) || 0;

        function renderCharacterCards() {
            const container = document.querySelector('.cards-container');
            container.innerHTML = '';
            for (let key in chars) {
                const char = chars[key];
                const card = document.createElement('div');
                card.id = `card-${key}`;
                card.className = 'card';
                
                const img = document.createElement('img');
                img.src = char.card;
                img.alt = char.name;
                
                const name = document.createElement('div');
                name.className = 'char-name';
                name.innerText = char.name;
                
                card.appendChild(img);
                card.appendChild(name);
                
                if (char.unlockWins > 0) {
                    card.classList.add('locked');
                    const lockIcon = document.createElement('div');
                    lockIcon.id = `lock-${key}`;
                    lockIcon.className = 'lock-icon';
                    lockIcon.innerHTML = `🔒<div class="unlock-hint" id="hint-${key}">${char.unlockWins} WIN</div>`;
                    card.appendChild(lockIcon);
                } else {
                    card.onclick = () => selectChar(key);
                }
                container.appendChild(card);
            }
        }

        function updateWinDisplay() {
            document.getElementById('win-counter').innerText = `WINS: ${winCount}`;
            for (let key in chars) {
                const char = chars[key];
                const card = document.getElementById(`card-${key}`);
                const lock = document.getElementById(`lock-${key}`);
                if (char.unlockWins > 0) {
                    if (winCount >= char.unlockWins) {
                        if (card) {
                            card.classList.remove('locked');
                            card.onclick = () => selectChar(key);
                        }
                        if (lock) lock.style.display = 'none';
                    } else {
                        if (card) {
                            card.classList.add('locked');
                            card.onclick = null;
                        }
                        if (lock) lock.style.display = 'flex';
                    }
                }
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            renderCharacterCards();
            updateWinDisplay();
        });

        function selectChar(charName) {
            const randomBg = backgrounds[Math.floor(Math.random() * backgrounds.length)];
            gameEl.style.setProperty('--bg-image', `url('${randomBg}')`);

            currentChar = charName;
            const otherChars = Object.keys(chars).filter(c => c !== currentChar);
            enemyChar = otherChars[Math.floor(Math.random() * otherChars.length)];

            menuEl.style.display = 'none';
            gameEl.style.display = 'block';
            playerX = viewportEl.clientWidth * 0.1;
            enemyX = viewportEl.clientWidth * 0.7;
            facingRight = true;
            enemyFacingRight = false;

            playerHp = 100;
            enemyHp = 100;
            gameActive = false;
            document.getElementById('game-over-screen').style.display = 'none';
            updateHpUI();

            updatePlayerChar();
            updateTransform();

            // Inisialisasi properti musuh agar segera terlihat
            enemyEl.style.backgroundImage = `url('${chars[enemyChar]['stance']}')`;
            enemyEl.style.display = 'block';

            updateEnemyTransform();

            // Render awal dan jalankan loop setelah 2 detik freeze
            startGameLoop();
            if (window.startFreezeTimer) clearTimeout(window.startFreezeTimer);
            window.startFreezeTimer = setTimeout(() => {
                gameActive = true;
            }, 2000);
        }

        function goBack() {
            if (window.startFreezeTimer) clearTimeout(window.startFreezeTimer);
            gameEl.style.display = 'none';
            menuEl.style.display = 'flex';
            document.getElementById('game-over-screen').style.display = 'none';
            stopGameLoop();
        }

        function setAction(action) {
            if (!currentChar) return;
            playerEl.style.backgroundImage = `url('${chars[currentChar][action]}')`;
        }

        function updateTransform() {
            playerEl.style.left = playerX + 'px';
            if (facingRight) {
                playerEl.className = '';
            } else {
                playerEl.className = 'flipped';
            }
        }

        function handleInput() {
            const charData = chars[currentChar];
            if (isPunching && !isPunchingActive) {
                isPunchingActive = true;
                setAction('punch');

                // Reset to stance/run after animation duration
                if (punchCooldownTimer) clearTimeout(punchCooldownTimer);
                punchCooldownTimer = setTimeout(() => {
                    isPunchingActive = false;
                }, charData.punchDuration);

            } else if (!isPunchingActive && (isMovingLeft || isMovingRight)) {
                setAction('run');
                if (isMovingLeft) {
                    playerX -= charData.speed;
                    facingRight = false;
                    if (playerX < -80) playerX = -80;
                }
                if (isMovingRight) {
                    playerX += charData.speed;
                    facingRight = true;
                    if (playerX > viewportEl.clientWidth - (pWidth - 80)) playerX = viewportEl.clientWidth - (pWidth - 80);
                }
                updateTransform();
            } else if (!isPunchingActive) {
                setAction('stance');
            }
        }

        function updateEnemyTransform() {
            if (!enemyEl) return;
            enemyEl.style.left = enemyX + 'px';
            if (enemyFacingRight) enemyEl.className = '';
            else enemyEl.className = 'flipped';
        }

        function handleEnemyAI() {
            if (!enemyChar) return;
            const charWidth = playerEl.offsetWidth;
            const distance = enemyX - playerX;
            const absDist = Math.abs(distance);
            const reach = charWidth * 0.45;

            // Jika musuh sedang memukul, biarkan durasinyaselesai
            if (enemyPunchTimer > 0) {
                enemyAction = 'punch';
                enemyPunchTimer--;
            } else {
                // Jika tidak sedang memukul, tentukan gerakan
                if (absDist > reach) {
                    enemyAction = 'run';
                    if (distance > 0) {
                        enemyX -= (chars[enemyChar].speed - 2);
                        enemyFacingRight = false;
                    } else {
                        enemyX += (chars[enemyChar].speed - 2);
                        enemyFacingRight = true;
                    }
                } else {
                    // Jika dalam jangkauan, ada peluang untuk memukul
                    if (Math.random() < 0.05) {
                        enemyAction = 'punch';
                        // Hitung frame berdasarkan 40 FPS (1000ms / 40 = 25ms per frame)
                        enemyPunchTimer = Math.floor(chars[enemyChar].punchDuration / 25);
                    } else {
                        enemyAction = 'stance';
                    }
                }
            }
            enemyEl.style.backgroundImage = `url('${chars[enemyChar][enemyAction]}')`;
        }

        function checkHit() {
            const charWidth = playerEl.offsetWidth;
            const distance = Math.abs(playerX - enemyX);
            const reach = charWidth * 0.45;
            pWidth = charWidth;

            // Player hitting enemy
            if (isPunchingActive && !playerPunchHit) {
                if (distance < reach && ((facingRight && enemyX > playerX) || (!facingRight && enemyX < playerX))) {
                    const charData = chars[currentChar];
                    enemyHp -= charData.damage;
                    playerPunchHit = true;
                    new Audio('ugh.mp3').play().catch(e => console.log(e));

                    // Knockback enemy based on attacker's knockback value after delay
                    setTimeout(() => {
                        if (!gameActive) return;
                        const knockbackDist = charWidth * charData.knockback;
                        if (facingRight) enemyX += knockbackDist;
                        else enemyX -= knockbackDist;

                        if (enemyX < -80) enemyX = -80;
                        if (enemyX > viewportEl.clientWidth - (pWidth - 80)) enemyX = viewportEl.clientWidth - (pWidth - 80);
                    }, charData.knockbackDelay);

                    checkGameOver();
                }
            }
            if (!isPunchingActive) playerPunchHit = false;

            if (enemyAction === 'punch' && !enemyPunchHit) {
                if (distance < reach && ((enemyFacingRight && playerX > enemyX) || (!enemyFacingRight && playerX < enemyX))) {
                    const enemyCharData = chars[enemyChar];
                    playerHp -= enemyCharData.damage;
                    enemyPunchHit = true;
                    new Audio('ugh.mp3').play().catch(e => console.log(e));

                    // Knockback player based on enemy's knockback value after delay
                    setTimeout(() => {
                        if (!gameActive) return;
                        const knockbackDist = charWidth * enemyCharData.knockback;
                        if (enemyFacingRight) playerX += knockbackDist;
                        else playerX -= knockbackDist;

                        if (playerX < -80) playerX = -80;
                        if (playerX > viewportEl.clientWidth - (pWidth - 80)) playerX = viewportEl.clientWidth - (pWidth - 80);
                    }, enemyCharData.knockbackDelay);

                    checkGameOver();
                }
            }
            if (enemyAction !== 'punch') enemyPunchHit = false;
            updateHpUI();
        }

        function checkGameOver() {
            if (playerHp <= 0 || enemyHp <= 0) {
                gameActive = false;
                const goScreen = document.getElementById('game-over-screen');
                const goTitle = document.getElementById('game-over-title');

                if (playerHp <= 0) {
                    goTitle.innerText = "KAMU KALAH!";
                    goTitle.className = "lose-text";
                } else {
                    goTitle.innerText = "KAMU MENANG!";
                    goTitle.className = "win-text";
                    winCount++;
                    localStorage.setItem('winCount', winCount);
                    updateWinDisplay();
                }

                setTimeout(() => {
                    goScreen.style.display = 'flex';
                }, 500);
            }
        }

        function gameLoop() {
            if (!gameActive) return;
            handleInput();
            handleEnemyAI();
            checkHit();
            updateTransform();
            updateEnemyTransform();
        }

        function startGameLoop() {
            clearInterval(moveInterval);
            moveInterval = setInterval(gameLoop, 1000 / 40); // ~40 FPS for smooth movement
            windowW = viewportEl.clientWidth;
        }

        function stopGameLoop() {
            clearInterval(moveInterval);
            isMovingLeft = false;
            isMovingRight = false;
            isPunching = false;
        }

        // Controls
        const btnLeft = document.getElementById('btn-left');
        const btnRight = document.getElementById('btn-right');
        const btnPunch = document.getElementById('btn-punch');

        function addInputListeners(el, isLeft, isRight, isP) {
            const start = (e) => {
                e.preventDefault();
                if (isLeft) isMovingLeft = true;
                if (isRight) isMovingRight = true;
                if (isP) isPunching = true;
            };
            const end = (e) => {
                e.preventDefault();
                if (isLeft) isMovingLeft = false;
                if (isRight) isMovingRight = false;
                if (isP) isPunching = false;
            };

            el.addEventListener('mousedown', start, { passive: false });
            el.addEventListener('touchstart', start, { passive: false });

            el.addEventListener('mouseup', end, { passive: false });
            el.addEventListener('mouseleave', end, { passive: false });
            el.addEventListener('touchend', end, { passive: false });
            el.addEventListener('touchcancel', end, { passive: false });
        }

        addInputListeners(btnLeft, true, false, false);
        addInputListeners(btnRight, false, true, false);
        addInputListeners(btnPunch, false, false, true);

        // Keyboard support
        window.addEventListener('keydown', (e) => {
            if (gameEl.style.display !== 'block') return;
            if (e.key === 'ArrowLeft' || e.key === 'a') isMovingLeft = true;
            if (e.key === 'ArrowRight' || e.key === 'd') isMovingRight = true;
            if (e.code === 'Space' || e.key === 'j') isPunching = true;
        });
        window.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowLeft' || e.key === 'a') isMovingLeft = false;
            if (e.key === 'ArrowRight' || e.key === 'd') isMovingRight = false;
            if (e.code === 'Space' || e.key === 'j') isPunching = false;
        });

        window.addEventListener('resize', () => windowW = viewportEl.clientWidth);

        let currentZoom = parseFloat(localStorage.getItem('savedZoom')) || 1;

        // Terapkan zoom yang tersimpan saat pertama kali dimuat
        window.addEventListener('DOMContentLoaded', () => zoomUI(0));

        function zoomUI(amount) {
            currentZoom += amount;
            if (currentZoom < 0.5) currentZoom = 0.5;
            if (currentZoom > 2.5) currentZoom = 2.5;

            localStorage.setItem('savedZoom', currentZoom);

            // Hapus transform pada controls jika ada
            document.getElementById('controls').style.transform = "none";

            // Lakukan zoom pada grup tombol secara individual dengan origin yang sesuai
            const groups = document.querySelectorAll('.btn-group');
            if (groups[0]) {
                groups[0].style.transform = `scale(${currentZoom})`;
                groups[0].style.transformOrigin = 'bottom left';
            }
            if (groups[1]) {
                groups[1].style.transform = `scale(${currentZoom})`;
                groups[1].style.transformOrigin = 'bottom right';
            }
        }

        function updatePlayerChar() {
            setAction('stance');
            playerEl.style.left = playerX + 'px';
        }
    </script>
</body>

</html>
